<!DOCTYPE html>
<html>
<head>

<title>Edit Home</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
    margin:0;
    padding:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(-45deg,#ff9966,#ff5e62,#f7971e,#ffd200);
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
}

.edit-box{
    width:500px;
    animation:fadeInUp 1s ease;
}

.card{
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#333;
    margin-bottom:25px;
    animation:slideDown 1s ease;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
    transition:0.3s;
}

input:focus{
    border-color:#ff5e62;
    box-shadow:0 0 10px rgba(255,94,98,0.4);
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.update-btn{
    background:#ff5e62;
}

.update-btn:hover{
    background:#e74c3c;
    transform:translateY(-3px) scale(1.03);
}

.back-btn{
    background:#007bff;
}

.back-btn:hover{
    background:#0056b3;
    transform:translateY(-3px) scale(1.03);
}

a{
    text-decoration:none;
}

/* Background Animation */
@keyframes gradientBG{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

/* Card Animation */
@keyframes fadeInUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Heading Animation */
@keyframes slideDown{
    from{
        opacity:0;
        transform:translateY(-40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="edit-box">

<div class="card">

<h2>✏️ Edit Home Details</h2>

<form method="POST">

<input
type="text"
name="owner"
value="{{ home[1] }}"
required>

<input
type="text"
name="address"
value="{{ home[2] }}"
required>

<input
type="number"
name="members"
value="{{ home[3] }}"
required>

<button type="submit" class="update-btn">
🔄 Update Home
</button>

</form>

<br>

<a href="/viewhome">
<button class="back-btn">
⬅ Back Home List
</button>
</a>

</div>

</div>

</body>
</html>
