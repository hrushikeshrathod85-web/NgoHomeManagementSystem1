<!DOCTYPE html>
<html>
<head>

<title>Donation Management</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
    margin:0;
    padding:0;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background:linear-gradient(-45deg,#ff6a00,#ee0979,#36d1dc,#5b86e5);
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
}

.donation-box{
    width:90%;
    margin:40px auto;
    animation:fadeIn 1s ease;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:25px;
    font-size:40px;
    animation:slideDown 1s ease;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
    margin-bottom:30px;
}

.donation-form{
    animation:zoomIn 1s ease;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
    transition:0.3s;
}

input:focus{
    border-color:#ff6a00;
    box-shadow:0 0 10px rgba(255,106,0,0.4);
    outline:none;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#ff6a00;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e65c00;
    transform:translateY(-3px) scale(1.05);
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
    animation:fadeInUp 1.2s ease;
}

th{
    background:#ff6a00;
    color:white;
    padding:15px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f8f8f8;
}

.back-btn{
    margin-top:20px;
    background:#007bff;
}

.back-btn:hover{
    background:#0056b3;
}

/* Background Animation */
@keyframes gradientBG{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

/* Heading Animation */
@keyframes slideDown{
    from{
        opacity:0;
        transform:translateY(-40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Form Animation */
@keyframes zoomIn{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* Table Animation */
@keyframes fadeInUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

</style>

</head>

<body>

<div class="donation-box">

<h1>❤️ Donation Management</h1>

<div class="card donation-form">

<form method="POST">

<input
type="text"
name="donor_name"
placeholder="Enter Donor Name"
required>

<input
type="number"
name="amount"
placeholder="Enter Donation Amount"
required>

<button type="submit">
💰 Add Donation
</button>

</form>

</div>

<table>

<tr>
<th>ID</th>
<th>Donor Name</th>
<th>Amount</th>
</tr>

{% for d in donations %}

<tr>

<td>{{ d[0] }}</td>
<td>{{ d[1] }}</td>
<td>₹ {{ d[2] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">
<button class="back-btn">
⬅ Back Dashboard
</button>
</a>

</div>

</body>
</html>
