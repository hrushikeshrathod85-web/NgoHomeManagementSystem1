<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
    margin:0;
    padding:0;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background:linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0);
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
}

.dashboard{
    width:90%;
    margin:40px auto;
    text-align:center;
}

.dashboard h1{
    color:white;
    margin-bottom:40px;
    font-size:42px;
    animation:slideDown 1s ease;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
}

.card-box{
    width:260px;
    background:rgba(255,255,255,0.95);
    padding:30px;
    border-radius:20px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.3);
    transition:0.4s;
    animation:fadeInUp 1s ease;
}

.card-box:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0px 15px 35px rgba(0,0,0,0.4);
}

.card-box h2{
    margin-bottom:20px;
    color:#333;
}

.card-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.card-box button:hover{
    background:#0056b3;
    transform:scale(1.05);
}

a{
    text-decoration:none;
}

/* Background Animation */
@keyframes gradientBG{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

/* Title Animation */
@keyframes slideDown{
    from{
        opacity:0;
        transform:translateY(-50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Card Animation */
@keyframes fadeInUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="dashboard">

<h1>🏠 NGO Home Management Dashboard</h1>

<div class="cards">

<div class="card-box">
    <h2>🏡 Add Home</h2>
    <a href="/addhome">
        <button>Add Home</button>
    </a>
</div>

<div class="card-box">
    <h2>📋 View Homes</h2>
    <a href="/viewhome">
        <button>View Homes</button>
    </a>
</div>

<div class="card-box">
    <h2>🏢 NGO Info</h2>
    <a href="/ngo">
        <button>NGO Details</button>
    </a>
</div>

<div class="card-box">
    <h2>❤️ Donations</h2>
    <a href="/donation">
        <button>Donation</button>
    </a>
</div>

<div class="card-box">
    <h2>📁 Project</h2>

    <a href="/project">
        <button>Project Details</button>
    </a>
</div>

<div class="card-box">
    <h2>🚪 Logout</h2>
    <a href="/logout">
        <button>Logout</button>
    </a>
</div>

</div>

</div>

</body>
</html>
